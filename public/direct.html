<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affichage Live TV - Challenge EDT 10.9</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-main: #fffdef;
            --primary: #042247;
            --primary-light: #8dafd8;
            --accent: #4283d3;
            --text-dark: #042247;
            --text-muted: #5b6f84;
            --border-color: #d0deeb;
            --card-bg: #ffffff;
            --success: #2e7d32;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            box-sizing: border-box;
            border-bottom: 3px solid var(--primary-light);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .header-logo {
            height: 50px;
            width: auto;
        }
        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
        }
        header h1 span {
            color: var(--primary-light);
        }
        .live-container {
            flex: 1;
            padding: 1.5rem;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
        }
        .scroll-container {
            height: 100%;
            overflow: hidden;
        }
        .scroll-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .live-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }
        .live-card-header {
            background-color: var(--primary-light);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .live-card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
        }
        .live-card-discipline {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            background-color: rgba(255, 253, 239, 0.6);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        .live-table {
            width: 100%;
            border-collapse: collapse;
        }
        .live-table th {
            background-color: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 0.5rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            text-transform: uppercase;
        }
        .live-table td {
            padding: 0.7rem 1.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-dark);
        }
        .live-table tr:last-child td {
            border-bottom: none;
        }
        .live-table tr:nth-child(even) td {
            background-color: rgba(141, 175, 216, 0.03);
        }
        .rank-badge {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="assets/images/logo.png" alt="Ligue" class="header-logo">
            <h1>Challenge EDT - <span>Direct TV</span></h1>
        </div>
        <div id="live-step-details" style="text-align: right; font-size: 0.95rem; font-weight: 500;">
            <span id="live-step-name" style="background: var(--accent); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; margin-right: 10px;">Chargement...</span>
            <span id="live-step-meta" style="color: #eaf2f9;"></span>
        </div>
    </header>

    <div class="live-container">
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-content">
                <!-- Chargé dynamiquement -->
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let currentStepKey = "";
            let shooters = {};
            let scrollInterval = null;

            if (db) {
                db.ref(`${ROOT}/${activeSeason}`).on("value", (snapshot) => {
                    const data = snapshot.val();
                    if (!data) return;

                    shooters = data.shooters || {};
                    const steps = data.steps || {};

                    const activeStep = Object.entries(steps).find(([k, v]) => v.status === "ongoing") || 
                                       Object.entries(steps).reverse().find(([k, v]) => v.status === "completed") ||
                                       Object.entries(steps)[0];
                    
                    if (activeStep) {
                        currentStepKey = activeStep[0];
                        document.getElementById("live-step-name").textContent = activeStep[1].name;
                        
                        let metaStr = "";
                        if(activeStep[1].lieu) metaStr += `Lieu : ${activeStep[1].lieu}`;
                        if(activeStep[1].date) metaStr += ` | Date : ${activeStep[1].date}`;
                        document.getElementById("live-step-meta").textContent = metaStr;
                    }
                    
                    buildLiveBoards();
                });
            }

            function buildLiveBoards() {
                const content = document.getElementById("scroll-content");
                
                if (scrollInterval) {
                    cancelAnimationFrame(scrollInterval);
                    scrollInterval = null;
                }
                
                content.innerHTML = "";
                let boardsAdded = 0;

                const disciplinesKeys = [...DISCIPLINES.map(d => d.key), COMBINE.key];

                // Respect strict de l'ordre d'affichage (Épreuve puis Catégorie d'âge)
                disciplinesKeys.forEach(discKey => {
                    CATEGORIES.forEach(cat => {
                        let list = [];
                        
                        Object.values(shooters)
                            .filter(s => normalizeCategoryCode(s.category) === cat.code)
                            .forEach(s => {
                                if (currentStepKey === "FINALE") {
                                    const qual = (s.results && s.results[currentStepKey]) ? parseFloat(s.results[currentStepKey][`${discKey}_qual`]) : null;
                                    const fin = (s.results && s.results[currentStepKey]) ? parseFloat(s.results[currentStepKey][`${discKey}_fin`]) : null;
                                    
                                    if ((qual !== null && !isNaN(qual)) || (fin !== null && !isNaN(fin))) {
                                        list.push({ 
                                            name: `${s.lastName} ${s.firstName}`, 
                                            club: s.club, 
                                            qualScore: qual,
                                            finScore: fin
                                        });
                                    }
                                } else {
                                    const score = (s.results && s.results[currentStepKey]) ? parseFloat(s.results[currentStepKey][discKey]) : null;
                                    if (score !== null && !isNaN(score)) {
                                        list.push({ 
                                            name: `${s.lastName} ${s.firstName}`, 
                                            club: s.club, 
                                            score: score 
                                        });
                                    }
                                }
                            });

                        if (list.length === 0) return;

                        // Tri spécifique
                        if (currentStepKey === "FINALE") {
                            list.sort((a, b) => {
                                const aF = a.finScore || 0; const bF = b.finScore || 0;
                                if (bF !== aF) return bF - aF;
                                return (b.qualScore || 0) - (a.qualScore || 0);
                            });
                        } else {
                            list.sort((a, b) => b.score - a.score);
                        }

                        boardsAdded++;

                        const card = document.createElement("div");
                        card.className = "live-card";
                        
                        let rowsHTML = "";
                        let rank = 1;
                        
                        list.forEach(item => {
                            if (currentStepKey === "FINALE") {
                                rowsHTML += `
                                    <tr>
                                        <td style="width: 10%; text-align: center;"><span class="rank-badge">${rank++}</span></td>
                                        <td style="width: 45%; text-transform: uppercase;">${item.name}</td>
                                        <td style="width: 25%; color: var(--text-muted);">${item.club}</td>
                                        <td style="width: 10%; text-align: right; color: var(--text-muted);">Q: ${item.qualScore !== null ? item.qualScore : "-"}</td>
                                        <td style="width: 10%; text-align: right; color: var(--success); padding-right: 1.5rem;">F: <strong>${item.finScore !== null ? item.finScore : "-"}</strong></td>
                                    </tr>
                                `;
                            } else {
                                rowsHTML += `
                                    <tr>
                                        <td style="width: 10%; text-align: center;"><span class="rank-badge">${rank++}</span></td>
                                        <td style="width: 50%; text-transform: uppercase;">${item.name}</td>
                                        <td style="width: 25%; color: var(--text-muted);">${item.club}</td>
                                        <td style="width: 15%; text-align: right; color: var(--success); padding-right: 1.5rem;"><strong>${item.score}</strong></td>
                                    </tr>
                                `;
                            }
                        });

                        let headersHTML = "";
                        if (currentStepKey === "FINALE") {
                            headersHTML = `
                                <tr>
                                    <th style="width: 10%; text-align: center;">Pl</th>
                                    <th style="width: 45%;">Nom Prénom</th>
                                    <th style="width: 25%;">Association</th>
                                    <th style="width: 10%; text-align: right;">Qualif.</th>
                                    <th style="width: 10%; text-align: right; padding-right: 1.5rem;">Finale</th>
                                </tr>
                            `;
                        } else {
                            headersHTML = `
                                <tr>
                                    <th style="width: 10%; text-align: center;">Pl</th>
                                    <th style="width: 50%;">Nom Prénom</th>
                                    <th style="width: 25%;">Association</th>
                                    <th style="width: 15%; text-align: right; padding-right: 1.5rem;">Score</th>
                                </tr>
                            `;
                        }

                        card.innerHTML = `
                            <div class="live-card-header">
                                <span class="live-card-title">${cat.label}</span>
                                <span class="live-card-discipline">${disciplineByKey(discKey).label}</span>
                            </div>
                            <table class="live-table">
                                <thead>${headersHTML}</thead>
                                <tbody>${rowsHTML}</tbody>
                            </table>
                        `;
                        content.appendChild(card);
                    });
                });

                if (boardsAdded === 0) {
                    content.innerHTML = `
                        <div style="text-align: center; padding: 4rem; background: white; border-radius: 12px; border: 1px solid var(--border-color);">
                            <h2 style="color: var(--text-muted); font-weight: 500;">Aucun tir enregistré pour le moment sur cette étape.</h2>
                        </div>
                    `;
                } else {
                    initScrolling();
                }
            }

            function initScrolling() {
                const container = document.getElementById("scroll-container");
                const content = document.getElementById("scroll-content");
                
                // Duplication parfaite du tableau pour assurer un défilement infini sans coupure
                const originalChildren = Array.from(content.children);
                originalChildren.forEach(child => {
                    const clone = child.cloneNode(true);
                    content.appendChild(clone);
                });

                let scrollPos = 0;
                const limit = content.scrollHeight / 2;

                function scrollLoop() {
                    scrollPos += 0.55; // Vitesse lente et fluide
                    if (scrollPos >= limit) {
                        scrollPos = 0;
                    }
                    container.scrollTop = scrollPos;
                    scrollInterval = requestAnimationFrame(scrollLoop);
                }
                
                scrollLoop();
            }
        });
    </script>
</body>
</html>
