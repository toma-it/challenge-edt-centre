<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmarès - Challenge EDT 10.9</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="assets/images/logo.png" alt="Ligue" class="header-logo">
            <h1>Challenge EDT - <span>La relève au 10.9</span></h1>
        </div>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="palmares.html" class="active">Classements</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="filter-step">Étape sélectionnée</label>
                    <select id="filter-step"></select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="filter-discipline">Épreuve</label>
                    <select id="filter-discipline">
                        <option value="all">Toutes les épreuves</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="filter-category">Catégorie</label>
                    <select id="filter-category">
                        <option value="all">Toutes les catégories</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="btn-pdf" style="height: 42px; margin-bottom: 1rem;">Exporter en PDF</button>
            </div>
        </div>

        <!-- Zone d'impression épurée -->
        <div id="palmares-print-zone" style="padding: 2rem;">
            <div class="pdf-header">
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <img src="assets/images/logo.png" alt="Logo" style="height: 60px; width: auto;">
                    <div class="pdf-header-title">
                        <h2>CHALLENGE ÉCOLES DE TIR</h2>
                        <h3 id="pdf-subtitle">Étape</h3>
                    </div>
                </div>
                <div id="pdf-meta" class="pdf-meta">Discipline | Catégorie</div>
            </div>

            <div id="dynamic-tables-container">
                <!-- Les tableaux épurés se chargeront ici via le script -->
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/palmares.js"></script>
</body>
</html>
