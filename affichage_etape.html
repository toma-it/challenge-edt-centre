<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats en Direct</title>
    <link rel="icon" href="logo.png">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        header.top {
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .discipline-section {
            background: #fff;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 30px;
            border: 1px solid #edf2f7;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, .03);
        }

        .discipline-title {
            color: #042247;
            background: #b0c7e2;
            border-left: 6px solid var(--primary);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0 0 16px 0;
            position: sticky;
            top: 118px;
            z-index: 90;
        }

        .category-title {
            background: #f3e6f0;
            color: #6d1f4e;
            padding: 7px 14px;
            border-radius: 10px;
            font-weight: 700;
            width: fit-content;
            border-left: 4px solid #9b3272;
            margin-bottom: 10px;
        }

        .rank-cell {
            font-weight: 800;
            width: 44px;
            text-align: center;
            color: var(--text-light);
        }

        .name-cell {
            font-weight: 700;
        }

        .score-cell {
            text-align: right;
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--primary);
        }

        .series-badge {
            display: inline-block;
            padding: 2px 6px;
            background: #e2e8f0;
            margin: 0 2px;
            border-radius: 4px;
            font-size: .85rem;
            font-weight: 600;
        }

        .table-scroll {
            overflow-x: auto;
        }

        .info-btn {
            position: fixed;
            bottom: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
        }

        .speed-slider {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <header class="top">
            <img src="logo.png" alt="Logo" style="height:65px;">
            <div style="text-align:center; flex:1;">
                <h1 id="compTitle">Chargement...</h1>
                <div class="sub" id="challengeSub"></div>
            </div>
            <img src="logo.png" alt="" style="height:65px; visibility:hidden;">
        </header>

        <div id="resultsContainer">
            <div class="no-data">Chargement des résultats...</div>
        </div>
    </div>

    <button class="info-btn no-print" onclick="document.getElementById('infoModal').classList.add('active')">ⓘ</button>
    <div class="modal-overlay no-print" id="infoModal">
        <div class="modal-content">
            <h3>Réglages</h3>
            <p>Vitesse de défilement automatique :</p>
            <input type="range" min="0" max="80" value="40" class="speed-slider" id="speedSlider"
                oninput="setSpeed(this.value)">
            <p style="font-size:.8rem; color:var(--text-light);">0 = défilement désactivé</p>
            <button class="btn secondary"
                onclick="document.getElementById('infoModal').classList.remove('active')">Fermer</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="ranking.js"></script>
    <script>
        const urlParams = new URLSearchParams(location.search);
        const seasonKey = urlParams.get('season');
        const etapeKey = urlParams.get('etape');
        document.getElementById('challengeSub').textContent = CONFIG.challengeName;

        let scrollSpeed = 90 - (parseInt(urlParams.get('speed')) || 40) * 1; // ms entre chaque pas de scroll (plus petit = plus rapide)
        function setSpeed(v) { scrollSpeed = 90 - parseInt(v); restartAutoScroll(); }

        if (!seasonKey || !etapeKey) {
            document.getElementById('resultsContainer').innerHTML = '<div class="no-data" style="color:#c0392b;">⚠️ Paramètres manquants (season / etape).</div>';
        } else {
            const etapeRef = db.ref(`${ROOT}/${seasonKey}/etapes/${etapeKey}`);

            etapeRef.child('config').on('value', snap => {
                const cfg = snap.val() || {};
                document.getElementById('compTitle').textContent = cfg.name || etapeKey;
                if (cfg.scrollSpeed !== undefined && !urlParams.has('speed')) {
                    document.getElementById('speedSlider').value = cfg.scrollSpeed;
                    scrollSpeed = 90 - cfg.scrollSpeed;
                }
            });

            etapeRef.child('shooters').on('value', snap => {
                const data = snap.val() || {};
                const all = Object.keys(data).map(k => data[k]);
                if (all.length === 0) {
                    document.getElementById('resultsContainer').innerHTML = '<div class="no-data">Aucun tireur enregistré pour le moment.</div>';
                    return;
                }
                renderResults(all);
            });
        }

        function renderResults(all) {
            const shootersByDiscipline = {};
            DISCIPLINES.forEach(d => shootersByDiscipline[d.key] = all.filter(s => s.discipline === d.key));

            let html = '';
            DISCIPLINES.forEach(disc => {
                html += `<div class="discipline-section"><h2 class="discipline-title">${disc.label}</h2>`;
                html += renderCategoryTables(shootersByDiscipline[disc.key]);
                html += `</div>`;
            });

            // Combiné (calculé automatiquement)
            const combineList = computeCombineForEtape(shootersByDiscipline);
            if (combineList.length > 0) {
                html += `<div class="discipline-section"><h2 class="discipline-title">${COMBINE.label}</h2>`;
                html += renderCategoryTables(combineList, true);
                html += `</div>`;
            }

            document.getElementById('resultsContainer').innerHTML = html;
        }

        function renderCategoryTables(list, isCombine) {
            const tree = groupByCategory(list);
            const cats = Object.keys(tree).sort();
            if (cats.length === 0) return '<div class="no-data">Aucun résultat pour le moment.</div>';
            let html = '';
            cats.forEach(cat => {
                const ranked = assignRanks(sortShooters(tree[cat]));
                html += `<div class="category-block"><div class="category-title">${categoryLabel(cat)}</div>
      <div class="table-scroll"><table><thead><tr>
        <th style="width:50px;">Pl.</th><th>Nom Prénom</th><th>Club</th>
        ${isCombine ? '<th style="text-align:right;">Pistolet</th><th style="text-align:right;">Carabine</th>' : '<th style="text-align:center;">Séries</th>'}
        <th style="text-align:right;">Total</th></tr></thead><tbody>`;
                ranked.forEach(s => {
                    const status = s.status || 'OK';
                    const hr = hasResult(status);
                    const medal = (s.displayRank === 1) ? '🥇 ' : (s.displayRank === 2) ? '🥈 ' : (s.displayRank === 3) ? '🥉 ' : '';
                    const displayScore = hr ? (s.score !== undefined ? Math.round(s.score * 10) / 10 : 0) : '-';
                    const mouchesSuffix = (s.mouches > 0 && hr) ? ` <small style="color:var(--text-light);">/${s.mouches}x</small>` : '';
                    let seriesOrCombineCells;
                    if (isCombine) {
                        seriesOrCombineCells = `<td style="text-align:right;">${hr ? s.pistoletScore : '-'}</td><td style="text-align:right;">${hr ? s.carabineScore : '-'}</td>`;
                    } else {
                        const series = hr ? (s.series || []) : [];
                        seriesOrCombineCells = `<td style="text-align:center;">${series.map(v => `<span class="series-badge">${Math.round(v * 10) / 10}</span>`).join('')}</td>`;
                    }
                    html += `<tr>
        <td class="rank-cell">${s.displayRank}</td>
        <td class="name-cell">${medal}${s.lastName} ${s.firstName}</td>
        <td>${s.club || '-'}</td>
        ${seriesOrCombineCells}
        <td class="score-cell">${displayScore}${mouchesSuffix}</td>
      </tr>`;
                });
                html += `</tbody></table></div></div>`;
            });
            return html;
        }

        let scrollIntervalId;
        let isScrolling = true;
        function startAutoScroll() {
            scrollIntervalId = setInterval(() => {
                if (scrollSpeed <= 5) return; // vitesse ~0 = pas de défilement
                if (isScrolling) {
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
                        isScrolling = false;
                        setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); setTimeout(() => { isScrolling = true; }, 2000); }, 3000);
                    } else { window.scrollBy(0, 1); }
                }
            }, scrollSpeed);
        }
        function restartAutoScroll() { if (scrollIntervalId) clearInterval(scrollIntervalId); startAutoScroll(); }
        setTimeout(startAutoScroll, 4000);
    </script>
</body>

</html>
